name: Build Co Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Win64,     os: windows-latest, target: Win64 }
          - { name: Android32, os: ubuntu-latest,  target: Android32 }
          - { name: Android64, os: ubuntu-latest,  target: Android64 }
          - { name: macOS,     os: macos-latest,   target: macOS }
          - { name: iOS,       os: macos-latest,   target: iOS }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Geode Mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: ${{ matrix.target }}
          combine: true

      # This prints the SDK path so we can fix the CMake logic
      - name: Verify SDK Path
        if: always()
        run: |
          echo "GEODE_SDK is: $GEODE_SDK"
          ls -R "$GEODE_SDK" || echo "SDK path is empty!"
