name: Build Co Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Windows,   os: windows-latest, target: Win64 }
          - { name: Android32, os: ubuntu-latest,  target: Android32 }
          - { name: Android64, os: ubuntu-latest,  target: Android64 }
          - { name: macOS,     os: macos-latest,   target: macOS }
          - { name: iOS,       os: macos-latest,   target: iOS }

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: ${{ matrix.target }}
          combine: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Co-Engine-${{ matrix.target }}
          path: ${{ steps.build.outputs.build-output }}/*.geode

  package:
    name: Package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create final zip
        run: |
          mkdir -p final_release
          find artifacts -name "*.geode" -exec cp {} final_release/ \;
          cd final_release
          zip -r Co_Engine_Release.zip ./*

      - name: Upload Release Package
        uses: actions/upload-artifact@v4
        with:
          name: Co_Engine_Release
          path: final_release/Co_Engine_Release.zip
