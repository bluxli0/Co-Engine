name: Build and Debug

on: [workflow_dispatch]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Win64,     os: windows-latest, target: Win64 }

    steps:
      - uses: actions/checkout@v4

      - name: Build Geode Mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: ${{ matrix.target }}
          combine: true

      # 🔍 THIS IS THE DETECTIVE STEP
      - name: Debug Environment Variables
        if: always()
        run: |
          echo "--- GEODE_SDK PATH ---"
          echo "$GEODE_SDK"
          echo "--- LISTING SDK DIRECTORY ---"
          ls -R "$GEODE_SDK" || echo "SDK directory is empty or missing!"
          echo "--- ENVIRONMENT VARIABLES ---"
          env | grep GEODE
