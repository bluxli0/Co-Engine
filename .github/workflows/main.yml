name: Build Co Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Win64,     os: windows-latest, target: Win64 }
          - { name: Android32, os: ubuntu-latest,  target: Android32 }
          - { name: Android64, os: ubuntu-latest,  target: Android64 }
          - { name: macOS,     os: macos-latest,   target: macOS }
          - { name: iOS,       os: macos-latest,   target: iOS }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Geode Mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: ${{ matrix.target }}
          combine: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Co-Engine-${{ matrix.name }}
          path: ${{ steps.build.outputs.build-output }}/*.geode
          if-no-files-found: error

  package:
    name: Package Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and Zip Artifacts
        run: |
          mkdir -p final_release
          # Copy all .geode files from the subfolders into one folder
          find artifacts -name "*.geode" -exec cp {} final_release/ \;
          # Zip it up
          cd final_release
          zip -r Co-Engine-Release.zip ./*

      - name: Upload Final Release Package
        uses: actions/upload-artifact@v4
        with:
          name: Co-Engine-Final-Package
          path: final_release/Co-Engine-Release.zip
