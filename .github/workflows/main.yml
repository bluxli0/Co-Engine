name: Build Co Engine

on: [push, workflow_dispatch]

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Win64,     os: windows-latest, target: Win64 }
          - { name: Android32, os: ubuntu-latest,  target: Android32 }
          - { name: Android64, os: ubuntu-latest,  target: Android64 }
          - { name: macOS,     os: macos-latest,   target: macOS }
          - { name: iOS,       os: macos-latest,   target: iOS }

    steps:
      - uses: actions/checkout@v4
        # Removed submodules: recursive

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: ${{ matrix.target }}
          combine: true
