name: Detective Build

on: [workflow_dispatch]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Manually install Geode CLI
      - name: Install Geode CLI
        run: |
          npm install -g @geode-sdk/cli
          
      # 2. Ask the CLI where it installed the SDK
      - name: Locate SDK
        run: |
          echo "Listing Environment Variables:"
          env | grep GEODE
          echo "Where is Geode installed?"
          geode sdk info || echo "Geode CLI not found"
          
      # 3. List the project files
      - name: List Files
        run: ls -R
