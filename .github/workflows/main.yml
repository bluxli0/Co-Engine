name: Build Co Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Win64,     os: windows-latest, target: Win64 }
          - { name: Android32, os: ubuntu-latest,  target: Android32 }
          - { name: Android64, os: ubuntu-latest,  target: Android64 }
          - { name: macOS,     os: macos-latest,   target: macOS }
          - { name: iOS,       os: macos-latest,   target: iOS }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 🌟 THE MISSING HANDSHAKE: This installs the CLI so CMake can find it
      - name: Setup Geode CLI
        uses: geode-sdk/setup-geode-cli@main

      - name: Build Geode Mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: ${{ matrix.target }}
          combine: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Co-Engine-${{ matrix.name }}
          path: ${{ steps.build.outputs.build-output }}/*.geode
          if-no-files-found: error
